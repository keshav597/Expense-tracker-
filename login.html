<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExpenseFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #080f22, #09142b, #0b1c36);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
        }

        body::before {
            width: 240px;
            height: 240px;
            background: rgba(139, 92, 246, 0.22);
            top: 30px;
            left: 40px;
        }

        body::after {
            width: 260px;
            height: 260px;
            background: rgba(59, 130, 246, 0.18);
            right: 30px;
            top: 80px;
        }

        .login-box {
            width: 100%;
            max-width: 550px;
            background: rgba(7, 15, 35, 0.9);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 34px 36px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            position: relative;
            z-index: 1;
        }

        .icon-box {
            width: 86px;
            height: 86px;
            margin: 0 auto 20px;
            border-radius: 24px;
            background: linear-gradient(135deg, #6d5dfc, #ec4899);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 0 12px 30px rgba(109, 93, 252, 0.35);
        }

        .login-box h1 {
            text-align: center;
            font-size: 2.7rem;
            margin-bottom: 10px;
        }

        .login-box p {
            text-align: center;
            color: #a8b4d1;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.88rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #dbe4ff;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 18px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            outline: none;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 1rem;
        }

        .form-group input::placeholder {
            color: #9aa7c7;
        }

        .checkbox-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.92rem;
            color: #d0dbf5;
        }

        .checkbox-label input {
            accent-color: #8b5cf6;
            width: 16px;
            height: 16px;
        }

        .forgot-link {
            color: #c4b5fd;
            text-decoration: none;
            font-size: 0.92rem;
        }

        .forgot-link:hover {
            color: white;
        }

        .terms-row {
            margin-bottom: 20px;
        }

        .terms-row .checkbox-label {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #6d5dfc, #8b5cf6, #ec4899);
            color: white;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            margin-bottom: 22px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .bottom-links {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .bottom-links a {
            color: #dbe4ff;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .bottom-links a:hover {
            color: white;
        }

        @media (max-width: 600px) {
            .login-box {
                padding: 26px 20px;
            }

            .login-box h1 {
                font-size: 2rem;
            }

            .checkbox-row,
            .bottom-links {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="icon-box">
            <i class="fas fa-user-circle"></i>
        </div>

        <h1>Welcome Back</h1>
        <p>Login and enter your premium expense dashboard.</p>

        <form action="dashboard.html">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>

            <div class="checkbox-row">
                <label class="checkbox-label">
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <div class="terms-row">
                <label class="checkbox-label">
                    <input type="checkbox" required>
                    I agree to the Terms & Conditions
                </label>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-right-to-bracket"></i> Login
            </button>
        </form>

        <div class="bottom-links">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <a href="dashboard.html">Skip Login</a>
        </div>
    </div>

</body>
</html>
