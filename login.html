<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExpenseTracker</title>
        <link rel="icon" type="image/png" href="image.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #080f22, #09142b, #0b1c36);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
            position: relative;
        }

        .login-box {
            width: 100%;
            max-width: 550px;
            background: rgba(7, 15, 35, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 34px 36px;
            box-shadow: 0px 6px 9px rgba(119, 125, 232);
            position: relative;
            z-index: 1;
        }

        .icon-box {
            width: 86px;
            height: 86px;
            margin: 0 auto 20px;
            border-radius: 24px;
            background: linear-gradient(135deg, #6d5dfc, #ec4899);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }

        .login-box h1 {
            text-align: center;
            font-size: 2.7rem;
            margin-bottom: 10px;
        }

        .login-box p {
            text-align: center;
            color: #a8b4d1;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.88rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #dbe4ff;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 18px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 1rem;
        }

        .form-group input::placeholder {
            color: #9aa7c7;
        }

        .checkbox-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.92rem;
            color: #d0dbf5;
        }

        .terms-row {
            margin-bottom: 20px;
        }

        .terms-row .checkbox-label {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #6d5dfc, #8b5cf6, #ec4899);
            color: white;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            margin-bottom: 22px;
        }

        .btn:hover {
            transform: translateY(-4px);
        }

        .bottom-links {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .bottom-links a {
            color: #dbe4ff;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .bottom-links a:hover {
            color: white;
        }
    </style>

    <link rel="icon" type="image/png" href="image.png">
</head>

<body>

    <div class="login-box">
        <div class="icon-box">
            <i class="fas fa-user-circle"></i>
        </div>

        <h1>Welcome </h1>
        <p>Login and enter your premium expense dashboard.</p>

        <form action="dashboard.html">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>

            <div class="checkbox-row">
                <label class="checkbox-label">
                    <input type="checkbox">
                    Remember me
                </label>

                <!-- <a href="#" class="forgot-link">Forgot Password?</a> -->
            </div>

            <div class="terms-row">
                <label class="checkbox-label">
                    <input type="checkbox" required>
                    I agree to the <a href="terms.html" style="color: #d0dbf5;">Terms & Conditions</a>
                </label>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-right-to-bracket"></i> Login
            </button>
        </form>

        <div class="bottom-links">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <a href="dashboard.html">Skip Login</a>
        </div>
    </div>

</body>

</html>
