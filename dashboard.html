<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <!-- preconnect bcz browser ko pehle hi btna hai to connect  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="image.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" style="text-decoration: none;" class="logo">
                    <i class="fas fa-wallet"></i>
                    <span>ExpenseTracker</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="dashboard.html" class="nav-item active">
                            <i class="fas fa-th-large"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="transaction.html" class="nav-item">
                            <i class="fas fa-exchange-alt"></i>
                            <span>Transactions</span>
                        </a>
                    </li>
                    <li>
                        <a href="saving.html" class="nav-item">
                            <i class="fa-solid fa-sack-dollar"></i>
                            <span>Saving</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="theme" id="theme">
                    <i class="fas fa-moon"></i> <!-- for moon icon -->
                    <span>Dark Mode</span>
                </div>
            </div>
        </aside>

        <main class="main">
            <!-- dashboard page -->
            <section class="page active" id="dashboardPage">
                <div class="page-header">
                    <div>
                        <h1>Dashboard</h1>
                        <p class="date-display" id="dateDisplay"></p>
                    </div>
                    <a href="login.html" class="login-btn">
                        <i class="fas fa-user"></i>
                    </a>
                </div>
                <!-- summary cards income balance -->
                <div class="cards">
                    <!-- for balance  -->
                    <div class="card balance" id="balanceCard">
                        <div class="card-icon">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <div class="card-info">
                            <p class="card-label">Total Balance</p>
                            <h2 class="card-amount" id="totalBalance">₹0.00</h2>
                        </div>
                    </div>
                    <!-- for income  -->
                    <div class="card income" id="incomeCard">
                        <div class="card-icon">
                            <i class="fas fa-arrow-down"></i>
                        </div>
                        <div class="card-info">
                            <p class="card-label">Total Income</p>
                            <h2 class="card-amount" id="totalIncome">₹0.00</h2>
                        </div>
                    </div>
                    <!-- for expense  -->
                    <div class="card expense" id="expenseCard">
                        <div class="card-icon">
                            <i class="fas fa-arrow-up"></i>
                        </div>
                        <div class="card-info">
                            <p class="card-label">Total Expenses</p>
                            <h2 class="card-amount" id="totalExpenses">₹0.00</h2>
                        </div>
                    </div>
                </div>

                <!-- Dashboard Body -->
                <div class="dashboard">
                    <!-- Add Transaction Form -->
                    <div class="form-container glass-card">
                        <h3><i class="fas fa-plus-circle"></i> Add Transaction</h3>
                        <form id="transactionForm">
                            <div class="form-group">
                                <label for="description">Description</label>
                                <input type="text" id="description" placeholder="e.g. Grocery shopping" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="amount">Amount (₹)</label>
                                    <input type="number" id="amount" placeholder="0.00" step="1" min="0.01" required>
                                </div>
                                <div class="form-group">
                                    <label for="type">Type</label>
                                    <select id="type" required>
                                        <option value="expense">Expense</option>
                                        <option value="income">Income</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="category">Category</label>
                                    <select id="category" required>
                                        <option value="food">🍔 Food & Dining</option>
                                        <option value="transport">🚗 Transport</option>
                                        <option value="shopping">🛍️ Shopping</option>
                                        <option value="entertainment">🎬 Entertainment</option>
                                        <option value="bills">📄 Bills & Utilities</option>
                                        <option value="health">🏥 Health</option>
                                        <option value="education">📚 Education</option>
                                        <option value="salary">💰 Salary</option>
                                        <option value="freelance">💻 Freelance</option>
                                        <option value="investment">📈 Investment</option>
                                        <option value="other">📦 Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="date">Date</label>
                                    <input type="date" id="date" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                <i class="fas fa-plus"></i> Add Transaction
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="recent-transactions glass-card">
                    <div class="section-header">
                        <h3><i class="fas fa-clock"></i> Recent Transactions</h3>
                        <a href="transaction.html" style="text-decoration: none;" class="btn btn-outline">View All</a>
                    </div>
                    <ul class="transaction-list" id="recentTransactionList">
                        <li class="empty-state" id="emptyRecent">
                            <i class="fas fa-receipt"></i>
                            <p>No transactions yet. Add your first one above!</p>
                        </li>
                    </ul>
                </div>
            </section>
            <!-- transaction page -->
            <section class="page" id="transactionsPage"></section>
            <!-- saving Page -->
            <section class="page" id="savingsPage"></section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
